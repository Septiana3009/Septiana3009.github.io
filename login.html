<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Login Sederhana</title>

  <style>
    body {
      margin: 0;
      font-family: "Poppins", Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
    }

    .card {
      width: 340px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      padding: 35px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      text-align: center;
      border: 2px solid rgba(255,255,255,0.6);
    }

    h2 {
      margin-bottom: 20px;
      color: #444;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      background: #f5f7fb;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      background: #ffffff;
      box-shadow: 0 0 0 2px #a1c4fd;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #89f7fe, #66a6ff);
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102,166,255,0.4);
    }

    #pesan {
      margin-top: 12px;
      font-weight: 500;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Login</h2>

  <form onsubmit="return login()">
    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button type="submit">Login</button>
  </form>

  <p id="pesan"></p>
</div>

<script>
function login() {
  const userBenar = "septi";
  const passBenar = "301809";

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const pesan = document.getElementById("pesan");

  if (username === "" || password === "") {
    pesan.style.color = "orange";
    pesan.innerText = "Harus diisi semua!";
    return false;
  }

  if (username === userBenar && password === passBenar) {
    pesan.style.color = "green";
    pesan.innerText = "Login berhasil!";
  } else {
    pesan.style.color = "red";
    pesan.innerText = "Username atau password salah!";
  }

  return false;
}
</script>

</body>
</html>
